name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Structural checks
        run: node scripts/check.mjs

      - uses: oven-sh/setup-bun@v2

      - name: OpenCode plugin smoke test
        run: bun scripts/opencode-smoke.ts

      - name: OpenCode package contents
        working-directory: clients/opencode
        run: npm pack --dry-run
